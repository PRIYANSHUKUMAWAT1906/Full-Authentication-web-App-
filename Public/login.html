<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="wrapper">

    <div class="container">

      <h2>Login</h2>

      <form id="loginForm">

        <input 
          type="email" 
          id="loginEmail" 
          placeholder="Enter your email" 
          required
        >

        <input 
          type="password" 
          id="loginPassword" 
          placeholder="Enter your password" 
          required
        >

        <button type="submit" id="lgbtn">Login</button>

      </form>
      <p id="logmessage"></p>
      <p>
        Don't have an account?
        <a href="signup.html">Signup</a>
      </p>

    </div>

  </div>

  

</body>
</html>
<script src="script.js"></script>
